<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大理旅游攻略 - 交通/住宿/最佳时间</title>
<meta name="description" content="大理旅游全攻略：交通指南、住宿推荐、最佳旅游时间、行程规划。">
<link rel="canonical" href="https://www.all-lv.com/city/dali/guide">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="/style.css">
<style>
/* ===== 城市选择器 ===== */
.city-selector{position:relative;margin-right:12px}
.city-selector-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);border-radius:var(--radius);cursor:pointer;font-size:.88rem;color:#fff;transition:all .2s;white-space:nowrap}
.city-selector-btn:hover{background:rgba(255,255,255,0.25);border-color:rgba(255,255,255,0.4)}
.city-selector-name{font-weight:600}
.city-dropdown{display:none;position:absolute;top:calc(100% + 8px);left:0;min-width:180px;background:#fff;border-radius:12px;box-shadow:0 12px 40px rgba(0,0,0,0.15);border:1px solid #e2e8f0;z-index:999;overflow:hidden}
.city-dropdown.open{display:block;animation:dropdownIn .2s ease}
@keyframes dropdownIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.city-dropdown-title{padding:12px 16px 8px;font-size:.75rem;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.city-option{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:.9rem;color:#1a1a2e;transition:background .15s;text-decoration:none}
.city-option:hover{background:#f1f5f9}
.city-option.active{background:#eff6ff;color:#1a73e8;font-weight:600}
.navbar.scrolled .city-selector-btn{background:rgba(0,0,0,0.06);border-color:#e2e8f0;color:#1a1a2e}
</style>
</head>
<body>
<nav class="navbar" id="navbar"><div class="nav-inner">
  
<div class="city-selector" id="citySelector">
  <button class="city-selector-btn" onclick="toggleCityMenu()">
    <span>🌍</span>
    <span class="city-selector-name">大理</span>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M3 5l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
  <div class="city-dropdown" id="cityDropdown">
    <div class="city-dropdown-title">选择目的地</div>
    <a href="/city/sanya/" class="city-option">undefined 三亚</a><a href="/city/chengdu/" class="city-option">undefined 成都</a><a href="/city/xian/" class="city-option">undefined 西安</a><a href="/city/hangzhou/" class="city-option">undefined 杭州</a><a href="/city/dali/" class="city-option active">undefined 大理</a><a href="/city/lijiang/" class="city-option">undefined 丽江</a><a href="/city/xiamen/" class="city-option">undefined 厦门</a><a href="/city/qingdao/" class="city-option">undefined 青岛</a><a href="/city/guilin/" class="city-option">undefined 桂林</a><a href="/city/lhasa/" class="city-option">undefined 拉萨</a>
  </div>
</div>
  <ul class="nav-links" id="navLinks">
    <li><a href="/city/dali/">首页</a></li>
    <li><a href="/city/dali/attractions">景点</a></li>
    <li><a href="/city/dali/food">美食</a></li>
    <li><a href="/city/dali/guide" class="active">攻略</a></li>
    <li><a href="/city/dali/itinerary">行程</a></li>
    <li><a href="/city/dali/blog">博客</a></li>
  </ul>
  <a href="/city/dali/itinerary" class="nav-cta">免费规划行程 →</a>
  <button class="hamburger" id="hamburger" aria-label="菜单"><span></span><span></span><span></span></button>
</div></nav>

<main style="max-width:960px;margin:0 auto;padding:100px 24px 60px">
  <nav style="font-size:.875rem;color:#6b7280;margin-bottom:24px"><a href="/city/dali/" style="color:#1a73e8">首页</a> / <span>旅游攻略</span></nav>
  <h1 style="font-size:2.2rem;font-weight:800;margin-bottom:8px">📋 大理旅游攻略</h1>
  <p style="color:#64748b;margin-bottom:40px;font-size:1.05rem">大理以苍山洱海、古城、白族文化著称，是文艺青年和背包客的理想目的地。</p>
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px">
    
  </div>
</main>

<footer class="footer"><div class="footer-inner"><p>© 2026 大理旅游官网 · <a href="/city/dali/">返回首页</a></p></div></footer>
<script>
window.addEventListener('scroll',function(){document.getElementById('navbar').classList.toggle('scrolled',window.scrollY>20)});
document.getElementById('hamburger').addEventListener('click',function(){document.getElementById('navLinks').classList.toggle('open')});

function toggleCityMenu(){var d=document.getElementById('cityDropdown');d.classList.toggle('open')}
document.addEventListener('click',function(e){if(!e.target.closest('.citySelector')&&!e.target.closest('.city-selector')){document.getElementById('cityDropdown')?.classList.remove('open')}});

</script>
</body>
</html>
