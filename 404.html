<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>页面未找到 | 全国旅游攻略</title>
  <meta name="description" content="抱歉，您访问的页面不存在。返回首页或浏览全国 41 座城市的旅游攻略。">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&family=Noto+Sans+SC:wght@400;500;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --brand: #BD4B2B;
      --brand-dark: #8F3517;
      --gray-50: #FBF8F4;
      --gray-100: #F3EEE7;
      --gray-200: #E9E1D6;
      --gray-400: #B8AB99;
      --gray-500: #8A7E6E;
      --gray-600: #6B6155;
      --gray-800: #332D28;
    }
    html, body {
      width: 100%; min-height: 100%;
      font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #FBF8F4 0%, #F3EEE7 100%);
      color: var(--gray-600);
    }
    .wrap {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 20px;
    }
    .card {
      max-width: 540px; width: 100%;
      background: #fff;
      border: 1px solid var(--gray-200);
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(33,28,24,.08);
      padding: 48px 40px;
      text-align: center;
    }
    .emoji { font-size: 3rem; margin-bottom: 12px; }
    .code {
      font-family: 'Noto Serif SC', serif;
      font-weight: 900;
      font-size: clamp(4rem, 14vw, 6rem);
      line-height: 1;
      background: linear-gradient(135deg, var(--brand) 0%, #D9794F 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.5rem; font-weight: 700;
      color: var(--gray-800); margin-bottom: 12px;
    }
    .desc { font-size: .95rem; line-height: 1.8; color: var(--gray-500); margin-bottom: 28px; }
    .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 12px 22px; border-radius: 10px;
      font-weight: 600; font-size: .95rem; text-decoration: none;
      transition: all .2s; cursor: pointer; border: none; font-family: inherit;
    }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dark); transform: translateY(-2px); box-shadow: 0 8px 20px rgba(189,75,43,.3); }
    .btn-ghost { background: var(--gray-100); color: var(--gray-600); }
    .btn-ghost:hover { background: var(--gray-200); transform: translateY(-2px); }
    .sug { margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--gray-200); }
    .sug h3 { font-size: .8rem; font-weight: 700; color: var(--gray-400); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 14px; }
    .sug-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
    .sug-grid a {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 6px; border-radius: 10px;
      background: var(--gray-50); border: 1px solid var(--gray-200);
      color: var(--gray-600); text-decoration: none; font-size: .85rem; font-weight: 500;
      transition: all .2s;
    }
    .sug-grid a:hover { border-color: var(--brand); color: var(--brand); transform: translateY(-2px); }
    @media (max-width: 480px) {
      .card { padding: 36px 22px; }
      .sug-grid { grid-template-columns: repeat(2, 1fr); }
      .btns { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="emoji">🧭</div>
      <div class="code">404</div>
      <h1 class="title">这条路线暂时迷路了</h1>
      <p class="desc">抱歉，您访问的页面已随旅人远行～<br>不妨返回首页，或挑一座城市重新出发。</p>
      <div class="btns">
        <a href="index.html" class="btn btn-primary">🏠 返回首页</a>
        <a href="sitemap.xml" class="btn btn-ghost">🗺️ 网站地图</a>
      </div>
      <div class="sug">
        <h3>🌏 热门目的地</h3>
        <div class="sug-grid">
          <a href="city/beijing/">🏛️ 北京</a>
          <a href="city/shanghai/">🌃 上海</a>
          <a href="city/chengdu/">🐼 成都</a>
          <a href="city/xian/">🏯 西安</a>
          <a href="city/hangzhou/">🌸 杭州</a>
          <a href="city/guilin/">🏞️ 桂林</a>
          <a href="city/sanya/">🏖️ 三亚</a>
          <a href="city/chongqing/">🔥 重庆</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
